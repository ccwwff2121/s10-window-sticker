<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>S-10 Window Sticker Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>S-10 Window Sticker Generator</h1>

  <section id="input-section">
    <label>VIN:</label>
    <input id="vin-input" type="text" maxlength="17">

    <label>RPO Codes (optional):</label>
    <textarea id="rpo-input" placeholder="GU6, ZQ8, ..."></textarea>

    <button id="generate-btn">Generate Sticker</button>
  </section>

  <section id="sticker-output"></section>

  <script src="utils.js"></script>
  <script src="vin.js"></script>
  <script src="sticker.js"></script>
  <script src="render.js"></script>
  <script src="app.js"></script>
</body>
</html>
